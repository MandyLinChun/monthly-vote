<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA 聚餐餐廳清單</title>
<style>
:root { color-scheme: light; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
  background: #f5f7fa; color: #1a202c; min-height: 100vh; padding-bottom: 48px;
}
.header {
  background: linear-gradient(135deg, #1e3a5f 0%, #4f46e5 100%);
  color: #fff; padding: 24px 20px 18px; text-align: center;
}
.header h1 { font-size: 1.3rem; font-weight: 800; }
.header .sub { font-size: .82rem; opacity: .82; margin-top: 5px; }
.search-bar {
  max-width: 680px; margin: 20px auto 0; padding: 0 16px;
}
.search-bar input {
  width: 100%; padding: 11px 16px; border-radius: 10px;
  border: 2px solid #e2e8f0; font-size: .95rem; outline: none;
  transition: border-color .15s;
}
.search-bar input:focus { border-color: #4f46e5; }
.filter-row {
  max-width: 680px; margin: 10px auto 0; padding: 0 16px;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.filter-btn {
  padding: 4px 12px; border-radius: 999px; border: 1.5px solid #e2e8f0;
  font-size: .76rem; font-weight: 600; cursor: pointer;
  background: #fff; color: #4a5568; transition: all .1s;
}
.filter-btn:hover { border-color: #4f46e5; color: #4f46e5; }
.filter-btn.active { background: #4f46e5; border-color: #4f46e5; color: #fff; }
.stats-bar {
  max-width: 680px; margin: 12px auto 0; padding: 0 16px;
  font-size: .78rem; color: #718096;
}
.list {
  max-width: 680px; margin: 12px auto 0; padding: 0 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.card {
  background: #fff; border-radius: 11px;
  box-shadow: 0 1px 3px rgba(0,0,0,.07);
  padding: 13px 16px;
  display: flex; align-items: center; gap: 12px;
  transition: box-shadow .12s;
}
.card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1); }
.card .num {
  font-size: .7rem; font-weight: 700; color: #a0aec0;
  min-width: 24px; text-align: center;
}
.card .name { font-size: .92rem; font-weight: 600; flex: 1; }
.card .type {
  font-size: .7rem; font-weight: 700; padding: 3px 8px;
  border-radius: 999px; white-space: nowrap;
  background: #eef2ff; color: #4338ca;
}
.empty {
  text-align: center; padding: 36px; color: #a0aec0; font-size: .88rem;
}
.footer-note {
  max-width: 680px; margin: 18px auto 0; padding: 0 16px;
  font-size: .74rem; color: #a0aec0; text-align: center;
}
</style>
</head>
<body>

<div class="header">
  <h1>🍽️ SA 聚餐餐廳清單</h1>
  <div class="sub">月會聚餐候選餐廳</div>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="搜尋餐廳名稱或類型…" oninput="render()">
</div>

<div class="filter-row" id="filter-row"></div>
<div class="stats-bar" id="stats-bar"></div>
<div class="list" id="list"></div>
<div class="footer-note">如需新增或修改餐廳，請聯絡 SA 管理員更新此檔案。</div>

<script>
// ══════════════════════════════════════
//  餐廳資料（請在此更新）
// ══════════════════════════════════════
const RESTAURANTS_DATA = [
  {"name":"龍都酒樓 中山總店","type":"中式"},
  {"name":"鰻料理 江戶川","type":"日式"},
  {"name":"丰禾 台北南京東店","type":"合菜"},
  {"name":"阿美飯店","type":"合菜"},
  {"name":"辣吉點正宗成都串串香林森條通店","type":"陸式"},
  {"name":"阿薄郎台式小酒館","type":"酒館"},
  {"name":"養心茶樓 蔬食飲茶","type":"港式"},
  {"name":"肥龍老火鍋 台北林森店","type":"重慶火鍋"},
  {"name":"吾皇大大「朕的鍋物」","type":"火鍋"},
  {"name":"肉多多火鍋-台北中山北店","type":"火鍋"},
  {"name":"鮨老大 日本料理","type":"日式"},
  {"name":"天香回味養生鍋 總店","type":"火鍋"},
  {"name":"AN-Burger","type":"漢堡"},
  {"name":"魚兵衛太春和食處","type":"日式"},
  {"name":"GALERIE Bistro 家樂利小酒館","type":"西式"},
  {"name":"Miacucina（My kitchen）南西店","type":"義式"},
  {"name":"默爾 pasta pizza(台北誠品南西店)","type":"義式"},
  {"name":"Cafe49 Restaurant & Bar","type":"義式"},
  {"name":"金孫韓廚 義大利麵 中山","type":"韓義"},
  {"name":"HATSU Yakiniku & Wine 和牛燒肉專門店","type":"燒肉"},
  {"name":"貳樓中山南西店","type":"美式"},
  {"name":"美天餐室 DAY DAY HAPPY FOOD","type":"港式"},
  {"name":"MO-MO-PARADISE 台北中山牧場","type":"壽喜燒"},
  {"name":"八條老宅麻辣鍋","type":"火鍋"}
];

// ══════════════════════════════════════
//  以下為顯示邏輯，不需修改
// ══════════════════════════════════════
let activeFilter = '全部';

function allTypes() {
  const s = new Set(RESTAURANTS_DATA.map(r => r.type));
  return ['全部', ...Array.from(s).sort()];
}

function buildFilters() {
  const row = document.getElementById('filter-row');
  allTypes().forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (t === '全部' ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => { activeFilter = t; updateFilterBtns(); render(); };
    row.appendChild(btn);
  });
}

function updateFilterBtns() {
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === activeFilter);
  });
}

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = RESTAURANTS_DATA.filter((r, i) => {
    const matchType = activeFilter === '全部' || r.type === activeFilter;
    const matchQ = !q || r.name.toLowerCase().includes(q) || r.type.toLowerCase().includes(q);
    return matchType && matchQ;
  });

  const list = document.getElementById('list');
  list.innerHTML = '';
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">😅 找不到符合的餐廳</div>';
  } else {
    filtered.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<span class="num">${i + 1}</span>
        <span class="name">${escHtml(r.name)}</span>
        <span class="type">${escHtml(r.type)}</span>`;
      list.appendChild(card);
    });
  }

  document.getElementById('stats-bar').textContent =
    `共 ${filtered.length} 間` + (q || activeFilter !== '全部' ? `（篩選自 ${RESTAURANTS_DATA.length} 間）` : '');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

buildFilters();
render();
</script>
</body>
</html>
